version: 2
updates:
  # NPM dependencies - weekly, minor + patch grouped
  - package-ecosystem: "npm"
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    # Groups define how Dependabot creates PRs for different update types
    groups:
      # minor + patch updates in one PR
      # applies-to is version updated by default so does not need to be specified
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      # security updates get individual PR and are labeled as security updates
      # applies-to: "security-updates" ensures this only applies to security vulnerabilities
      security-updates:
        patterns:
          - '*'
        applies-to: 'security-updates'
  # GitHub Actions - alerts only, no auto-updates
  - package-ecosystem: "github-actions"
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
