---
# CI/CD Pipeline
#
# Flow:
#   pull_request  → setup → (lint + test-pr) in parallel
#                   test-pr runs against local dev server (Chrome only)
#
#   push master   → setup → lint → deploy → test-production
#                   deploy builds and ships to S3/CloudFront
#                   test-production verifies the live site after deploy
#
#   schedule /    → setup → test-production (smoke test, no redeploy)
#   workflow_dispatch
name: CI/CD

# "on" is linter safe since it's a reserved word in YAML
"on":
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 3 * * 0"
  # Manual trigger option - appears as separate job in UI because it has no dependencies
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"
        type: choice
        options:
          - info
          - warning
          - debug

jobs:
  # ============================================================================
  # SETUP: Install dependencies once, share with all other jobs
  # ============================================================================
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    outputs:
      cypress_version: ${{ steps.cypress-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"

      # Read the exact resolved Cypress version from the lockfile so the Docker image tag
      # always matches what npm ci would install — no manual sync needed
      - name: Get Cypress version
        id: cypress-version
        run: |
          VERSION=$(node -p \
            "require('./package-lock.json').packages['node_modules/cypress'].version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Cypress binary is provided by the cypress/included Docker image — cache node_modules only
      # Cache key includes CYPRESS_INSTALL_BINARY so a flag change busts the cache
      - name: Cache node-modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-no-cypress-binary

      # Only install if cache miss (usually only on first run or package changes)
      # CYPRESS_INSTALL_BINARY=0 skips downloading the binary — it lives in the Docker image
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: "0"

  # ============================================================================
  # LINT: Check code style and quality
  # ============================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-no-cypress-binary

      - name: Run linter
        run: |
          npm run lint:js
          npm run lint:yaml

  # ============================================================================
  # TEST (PR): Run Cypress against local dev server
  # Uses cypress/included Docker image — Cypress and Chrome are pre-installed
  # ============================================================================
  test-pr:
    name: E2E Tests PR (chrome)
    runs-on: ubuntu-latest
    container: cypress/included:${{ needs.setup.outputs.cypress_version }}
    needs: setup
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Restore node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-no-cypress-binary

      - name: Install dependencies (cache miss fallback)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: "0"

      - name: Run Cypress E2E against local server
        run: |
          npm start &
          node_modules/.bin/wait-on http://localhost:4280 --timeout 60000
          cypress run --browser chrome --headless
        env:
          CYPRESS_BASE_URL: http://localhost:4280

      - name: Upload test failure screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots-pr
          path: cypress/screenshots
          if-no-files-found: ignore

  # ============================================================================
  # DEPLOY: Build and ship to S3 + invalidate CloudFront
  # Runs only on push to master, after lint passes
  # Requires secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
  # ============================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-no-cypress-binary

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ s3://www.kimbell.me --delete

      - name: Invalidate CloudFront cache
        run: >
          aws cloudfront create-invalidation
          --distribution-id E2UIRXEU09EPZZ
          --paths "/*"

  # ============================================================================
  # TEST (PRODUCTION): Verify the live site
  # Runs after deploy on push to master, or standalone on schedule/dispatch
  # Uses if: always() so it still runs when deploy was skipped (schedule/dispatch)
  # Uses cypress/included Docker image — Cypress and Chrome are pre-installed
  # ============================================================================
  test-production:
    name: E2E Tests Production (chrome)
    runs-on: ubuntu-latest
    container: cypress/included:${{ needs.setup.outputs.cypress_version }}
    needs: [setup, deploy]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      needs.deploy.result != 'failure' &&
      (
        needs.deploy.result == 'success' ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Restore node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-no-cypress-binary

      - name: Install dependencies (cache miss fallback)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci
        env:
          CYPRESS_INSTALL_BINARY: "0"

      - name: Run Cypress E2E against production
        run: cypress run --browser chrome --headless
        env:
          CYPRESS_BASE_URL: https://kimbell.me

      - name: Upload test failure screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots-production
          path: cypress/screenshots
          if-no-files-found: ignore

  # ============================================================================
  # MANUAL TRIGGER: Debug logging (only runs on workflow_dispatch)
  # ============================================================================
  manual-trigger:
    name: Manual Workflow Trigger
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Log manual trigger info
        run: |
          echo "Manual workflow triggered."
          echo "Log level: $LEVEL"
        env:
          LEVEL: ${{ inputs.logLevel }}
